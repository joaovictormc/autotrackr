services:
  postgres:
    image: postgres:16-alpine
    container_name: autotrackr_db
    environment:
      POSTGRES_USER: autotrackr
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: autotrackr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotrackr"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: autotrackr_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autotrackr.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
